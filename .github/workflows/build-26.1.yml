name: 'Build 26.1'
run-name: Build 26.1-${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version'
        required: true
        default: '0.0.0-dev'
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:
  build-26-1:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mc2discord-26.1
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-26.1-${{ runner.os }}-${{ hashFiles('**/gradle.properties', '**/build.gradle.kts', '**/settings.gradle', '**/gradle-wrapper.jar') }}
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build
        env:
          INPUT_VERSION: ${{ inputs.version }}
      # - uses: actions/upload-artifact@v4
      #   with:
      #     name: mc2discord-forge-26.1-${{ inputs.version }}
      #     path: |
      #       ${{ github.workspace }}/mc2discord-26.1/forge/build/libs/
      #       !${{ github.workspace }}/mc2discord-26.1/forge/build/libs/*-slim.jar
      - uses: actions/upload-artifact@v4
        with:
          name: mc2discord-fabric-26.1-${{ inputs.version }}
          path: |
            ${{ github.workspace }}/mc2discord-26.1/fabric/build/libs/
            !${{ github.workspace }}/mc2discord-26.1/fabric/build/libs/*-all.jar
      - uses: actions/upload-artifact@v4
        with:
          name: mc2discord-neoforge-26.1-${{ inputs.version }}
          path: |
            ${{ github.workspace }}/mc2discord-26.1/neoforge/build/libs/
            !${{ github.workspace }}/mc2discord-26.1/neoforge/build/libs/*-all.jar