name: "Publish 26.1"
run-name: Publish 26.1-${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version"
        required: true
        default: "0.0.0-dev"

jobs:
  build-26-1:
    uses: ./.github/workflows/build-26.1.yml
    with:
      version: ${{ inputs.version }}

  publish-forge-26-1:
    uses: ./.github/workflows/publish-forge-26.1.yml
    needs: build-26-1
    with:
      version: ${{ inputs.version }}
    secrets: inherit

  publish-fabric-26-1:
    uses: ./.github/workflows/publish-fabric-26.1.yml
    needs: publish-forge-26-1
    with:
      version: ${{ inputs.version }}
    secrets: inherit
  
  publish-neoforge-26-1:
    uses: ./.github/workflows/publish-neoforge-26.1.yml
    needs: publish-fabric-26-1
    with:
      version: ${{ inputs.version }}
    secrets: inherit